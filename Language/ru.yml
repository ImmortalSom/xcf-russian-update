  STR_SHOTGUN: Дробовик
  STR_SHOTGUN_UFOPEDIA: "Мощное и точное оружие ближнего боя, позволяющее вести стрельбу патронами с дробью. Однако магазин вмещает всего 6 патронов.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Нештатное оружие{ALT}."
