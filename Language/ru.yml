  STR_OICW: XM29 OICW
  STR_OICW_UFOPEDIA: "XM29 OICW - экспериментальная штурмовая винтовка. Использует патроны 5.56mm NATO и 20mm фугасные гранаты. Продвинутая оптика повышает смертоносность оружия. Однако для эффективного использования требуется обученный боец.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}, {ALT}Возрождённое оружие{ALT}, {ALT}Лицензия на использование взрывчатки{ALT} и {ALT}Любое оружие под патрон 5.56mm NATO{ALT}.{NEWLINE}"
