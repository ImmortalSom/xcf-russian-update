  STR_BREAKDOWN_STR_HUMAN_SONIC_SHOTGUN_FOCUSED_CLIP: "РЗБ: бат. Акустического дробовика [фокус]"
  STR_DOUBLE_BARRELED: Двустволка
  STR_DOUBLE_BARRELED_UFOPEDIA: Это оружие примитивно по конструкции, но по-прежнему способно наносить смертельные повреждения небронированным целям.
