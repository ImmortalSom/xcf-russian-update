  STR_WP_5_45_CLIP_BUY: Приобретение маг. Патрон 5,45 мм
  STR_AKM: AKM
  STR_AKM_UFOPEDIA: "Более современная версия легендарной штурмовой винтовки АК-47. Использует те же патроны 7,62 мм.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}."
  STR_AKM_BUY: Приобретение AKM
  STR_AKM_BUY_PREQ_A: Требование A для AKM
  STR_AKM_BUY_PREQ_B: Требование B для AKM
  STR_AK47: АК-47
  STR_AK47_UFOPEDIA: "Самая распространённая штурмовая винтовка в мире. АК-47 надёжен и мощен, хотя значительно устарел по сравнению с современными образцами.{NEWLINE}{NEWLINE}Для покупки этого оружия требуется: {ALT}Повышение II{ALT}."
  STR_AK47_BUY: Приобретение АК-47
  STR_AK47_BUY_PREQ_A: Требование А для АК-47
  STR_AK47_BUY_PREQ_B: Требование Б для АК-47
  STR_ADS: Автомат АДС
  STR_ADS_UFOPEDIA: "АДС - российская штурмовая винтовка. Разработана преимущественно для боевых пловцов. Для стрельбы над водой используются стандартные патроны 5,45 мм. Под водой применяются специальные игловидные пули.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Подводное оружие{ALT}."
  STR_ADS_DART: маг. Иглы АДС
  STR_FLAME_GLOVE: Огненная перчатка
  STR_FLAME_GLOVE_USE: Использование Огненной перчатки
  STR_FLAME_GLOVE_UFOPEDIA: Это оружие использует сфокусированную псионическую энергию для создания небольшого термоядерного сгустка. Огненная перчатка позволяет владельцу управлять движением сгустка и применять его как метательное оружие. Мощность напрямую зависит от псионического потенциала пользователя.
