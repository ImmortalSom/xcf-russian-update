  STR_ALIEN_LASER_RIFLE_DISASSEMBLY: "РЗБ: Винтовка пришельцев"
  STR_AKSU74: AKSU-74
  STR_AKSU74_UFOPEDIA: "Укороченная и улучшенная версия автомата Калашникова. Разработана для ВДВ и спецподразделений МВД стран Варшавского договора.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}."
