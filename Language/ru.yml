  STR_SONIC_PISTOL: Акустический пистолет
  STR_SONIC_PISTOL_UFOPEDIA: Акустические пистолеты — тип оружия, основанный на использовании ультразвуковых волн, способных за секунды превратить кости в желе. Ультразвуковые волны находятся за пределами диапазона человеческого слуха. Оружие может работать под водой, но его эффективная дальность невелика, точность резко падает на дистанциях свыше 14.
