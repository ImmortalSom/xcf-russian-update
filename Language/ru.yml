  STR_UAC_PLASMA_RIFLE: Инферно-винтовка VAST
  STR_UAC_PLASMA_RIFLE_UFOPEDIA: Это плазменное оружие использует батареи с "Эссенцией Ада". Для управления требуется значительная ментальная устойчивость. Неквалифицированные пользователи сталкиваются с инцидентами значительно чаще, чем предполагает статистика.
  STR_UAC_PLASMA_RIFLE_BUY: Приобретение Инферно-винтовки VAST
  STR_UAC_PLASMA_RIFLE_CLIP: бат. Инферно-винтовки VAST
  STR_UAC_PLASMA_RIFLE_CLIP_UFOPEDIA: Энергетический блок для Инферно-винтовки VAST. Источник питания - так называемая "Адская эссенция" - основан на чрезвычайно мощной псионической энергии, извлекаемой из "Ада". "Ад" представляет собой нематериальный план, населённый демоническими сущностями, связанными с Культом Апокалипсиса.
  STR_UAC_LIGHT_PLASMA_GUN: Инферноган VAST
  STR_UAC_LIGHT_PLASMA_GUN_UFOPEDIA: Это загадочное оружие стреляет плазменными сгустками. Мощный источник энергии отличается нестабильностью. Управление даётся с трудом. Однако исключительно сильный разум способен превратить его в особо смертоносное оружие.
  STR_UAC_LIGHT_PLASMA_GUN_BUY: Приобретение Инферноган VAST
  STR_UAC_LIGHT_PLASMA_GUN_CLIP: бат. Инферноган VAST
  STR_UAC_LIGHT_PLASMA_GUN_CLIP_UFOPEDIA: Энергетический блок для Инферноган VAST. По сути это контейнер, наполненный чрезвычайно мощной пси-энергией - так называемой "Эссенцией Ада". Источник - "Ад", нематериальный план демонических существ, связанный с Культом Апокалипсиса.
  STR_SWD: СВД
  STR_SWD_UFOPEDIA: "Оружие поддержки советской разработки. Предназначено для поражения целей за пределами дальности штурмовых винтовок. Для высокого урона требуется приличная точность стрельбы.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}."
