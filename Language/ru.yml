  STR_HARPOON: Подводное ружьё
  STR_HARPOON_UFOPEDIA: Стандартный метатель гарпунов. Полезен для охоты на крупную рыбу. Оружие может метать обычные гарпуны, а также модифицированные - например, взрывные.
  STR_HARPOON_CLIP: гарп. Подводного ружья
