  STR_WILDEY: Wildey Magnum
  STR_WILDEY_UFOPEDIA: "Широко известный по фильму Чарльза Бронсона \"Жажда смерти\", этот мощный пистолет использует модифицированные патроны для охоты на крупную дичь. Урон значительно увеличивается при высокой точности стрелка, но оружие показывает крайне низкую эффективность против бронежилетов.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Нестандартное оружие{ALT}."
