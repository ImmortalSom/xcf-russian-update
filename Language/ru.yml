  STR_SWD_CLIP: маг. СВД
  STR_STEYR_AUG: Steyr AUG
  STR_STEYR_AUG_UFOPEDIA: "Оружие использует стандартные патроны 5.56mm NATO, которые пробивают броню лучше большинства винтовок. Продвинутая прицельная система повышает точность. Однако скорость стрельбы немного снижена.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT} и {ALT}Любое оружие под патрон 5.56mm NATO{ALT}.{NEWLINE}"
  STR_STEYR_AUG_BUY: Приобретение Steyr AUG
  STR_RIFLE_M16_CLIP: маг. Патрон 5.56mm NATO
  STR_STAR_MUSKET: Звёздный мушкет
  STR_STAR_MUSKET_UFOPEDIA: Это плазменное оружие. Плазменный снаряд формируется благодаря пси-способностям стрелка и радиоактивной пыли. Мощность оружия напрямую зависит от пси-потенциала пользователя. Процесс также требует милости Золотой Леди. В руках её наиболее преданных последователей оружие становится ещё мощнее.
  STR_STAR_MUSKET_CLIP: катр. Звёздного мушкета
  STR_STAR_MUSKET_CLIP_UFOPEDIA: Цилиндр, заполненный сухими химическими веществами. Используется как реактивная масса для Звёздного мушкета.
  STR_SPORTING_RIFLE: Спортивная винтовка
  STR_SPORTING_RIFLE_UFOPEDIA: Это лёгкое оружие отличается хорошей точностью на средних дистанциях. Прекрасно подходит для охоты на мелкую дичь.
  STR_SPORTING_RIFLE_CLIP: кас. Спортивной винтовки
  STR_SONIC_BLASTA_RIFLE: Акустическая винтовка
  STR_SONIC_BLASTA_RIFLE_UFOPEDIA: Мощное устройство акустического действия. Даже высокоуглеродистая сталь не защищена от этого оружия. Сверхкомпактный излучатель волн усилен сверхпроводящим усилителем. Это повышает мощность оружия. Единственный недостаток - относительно небольшая эффективная дальность для винтовки.
  STR_SONIC_BLASTA_RIFLE_CLIP: бат. Акустической винтовки
  STR_SONIC_BLASTA_RIFLE_CLIP_UFOPEDIA: Этот компактный элемент служит источником питания для акустической винтовки - мощного оружия пришельцев. Содержит небольшое количество зрбита.
