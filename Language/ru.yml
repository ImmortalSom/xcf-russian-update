  STR_HARPOON_AA_CLIP_MANUFACTURING: Производство гарп. Подводного ружья [Tr]
  STR_GROZA: ОЦ-14 "Гроза"
  STR_GROZA_UFOPEDIA: "Эта современная версия АК-47 отличается большей точностью и скоростью прицеливания. Это достигнуто благодаря компоновке булл-пап. Однако по той же причине максимальная дальность ограничена. Перезарядка происходит медленнее.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}."
  STR_GROZA_BUY: Приобретение ОЦ-14 "Гроза"
  STR_GROZA_BUY_PREQ_A: Требование A для ОЦ-14 "Гроза"
  STR_GROZA_BUY_PREQ_B: Требование B для ОЦ-14 "Гроза"
  STR_WP_7_62_CLIP: маг. Патрон 7,62 мм
  STR_WP_7_62_CLIP_BUY: Приобретение маг. Патрон 7,62 мм
  STR_GAUSS_RIFLE: Гаусс винтовка
  STR_GAUSS_RIFLE_UFOPEDIA: Эта штурмовая винтовка использует технологию Гаусса. Она предназначена для поражения тяжёловооружённых подразделений и лёгкой боевой техники.
  STR_GAUSS_RIFLE_CLIP: маг. Гаусс винтовки
  STR_GAUSS_RIFLE_DISASSEMBLY: "РЗБ: Гаусс винтовка"
  STR_GALIL: Автомат Galil
  STR_GALIL_UFOPEDIA: "Эта облегчённая версия винтовки под патрон 7.62mm NATO разработана для израильских вооружённых сил и полицейских подразделений. В том числе для охраны Кнессета.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}."
  STR_GALIL_BUY: Приобретение Автомата Galil
  STR_G36: H&K G36
  STR_G36_UFOPEDIA: "Heckler & Koch G36 - основная боевая винтовка Бундесвера с 1997 года. Оружие использует стандартные патроны 5.56mm NATO, которые пробивают броню лучше большинства винтовок. По сравнению с другими винтовками под этот калибр, H&K G36 обладает меньшим весом и более продвинутой оптикой.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT} и {ALT}Любое оружие под патрон 5.56mm NATO{ALT}.{NEWLINE}"
  STR_G36_BUY: Приобретение H&K G36
  STR_G36_BUY_PREQ_A: Требование A для H&K G36
  STR_G36_BUY_PREQ_B: Требование B для H&K G36
  STR_G11: H&K G11
  STR_G11_UFOPEDIA: "Экспериментальное безгильзовое оружие производства Heckler & Koch. Отличается крайне точной стрельбой очередями. Его безгильзовые патроны пробивают броню лучше большинства винтовок. Кажется, оно лучше всего работает в руках хладнокровных профессионалов.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}.{NEWLINE}"
  STR_G11_BUY: Приобретение H&K G11
  STR_G11_CLIP: маг. H&K G11
  STR_FN_FAL: FN FAL
  STR_FN_FAL_UFOPEDIA: "Надёжное, точное и мощное оружие. Использует патроны 7.62mm NATO. Не лучший выбор для новичка.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}."
  STR_FN_FAL_BUY: Приобретение FN FAL
  STR_FAMAS: FAMAS
  STR_FAMAS_UFOPEDIA: "Булл-пап винтовка французского производства. Использует стандартные патроны 5.56x45mm NATO.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Любое оружие под патрон 5.56mm NATO{ALT}."
  STR_FAMAS_BUY: Приобретение FAMAS
  STR_FAMAS_BUY_PREQ_A: Требование A для FAMAS
  STR_FAMAS_BUY_PREQ_B: Требование B для FAMAS
  STR_DRAGON_BREATH_RIFLE: Мушкет "Дыхание дракона"
  STR_DRAGON_BREATH_RIFLE_UFOPEDIA: Двуручный вариант теплового луча рептоидов. Предназначен для стрельбы на большие дистанции. Редко используется рептоидами в Шогге, но часто применяется при проведении операций на поверхности.
  STR_DRAGON_BREATH_RIFLE_CLIP: бат. Мушкета "Дыхание дракона"
  STR_DRAGON_BREATH_RIFLE_CLIP_UFOPEDIA: Алмазный кристалл для питания Мушкета "Дыхание дракона".
  STR_DISRUPTOR_RIFLE: Дизраптор-винтовка
  STR_DISRUPTOR_RIFLE_UFOPEDIA: Эта инопланетная винтовка испускает луч экзотических частиц, который практически полностью игнорирует броню. Оружие состоит главным образом из органических компонентов. Срок службы его биологического компонента напрямую зависит от интенсивности использования. У нас нет возможности воспроизвести это оружие в наших лабораториях. Броня практически бесполезна против WARP-оружия.
  STR_DART_RIFLE: Дарт-винтовка
  STR_DART_RIFLE_CONT: Дарт-винтовка (продолжение)
  STR_DART_RIFLE_UFOPEDIA: "В основе конструкции - лучшие знания об инопланетной биологии. Стреляет дротиками с мощным нелетальным биохимическим агентом. В достаточном количестве он обездвиживает любую форму жизни, которую можно встретить на поле боя. Оружие можно использовать под водой.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Требование для Дротикомета{ALT}."
  STR_DART_RIFLE_CLIP_STUN: кас. Дарт-винтовки [оглуш.]
  STR_DART_RIFLE_CLIP_ACID: кас. Дарт-винтовки [кисл.]
  STR_DART_RIFLE_CLIP_ELECTRIC: кас. Дарт-винтовки [электр.]
  STR_DART_RIFLE_CLIP_ANTI_E115: кас. Дарт-винтовки [Anti-E115]
  STR_DART_RIFLE_PREQ: Требование для Дарт-винтовки
  STR_DART_MUSKET: Дарт-пушка
  STR_DART_MUSKET_CONT: Дарт-пушка (продолжение)
  STR_DART_MUSKET_UFOPEDIA: Способ, которым лягушка-вол атакует языком своих врагов, вдохновил наших инженеров на создание этого нелетального оружия. Дальность и точность стрельбы выше, чем у обычной Дарт-винтовки, но для её производства необходимы органические ткани лягушки-вола.
  STR_COLT_COMMANDO: Colt Commando
  STR_COLT_COMMANDO_UFOPEDIA: Американский карабин из семейства CAR-15. Наибольшее распространение получил в ходе конфликта во Вьетнаме.
  STR_COLT_COMMANDO_BUY: Приобретение Colt Commando
  STR_COLT_COMMANDO_BUY_PREQ_A: Требование A для Colt Commando
  STR_COLT_COMMANDO_BUY_PREQ_B: Требование B для Colt Commando
  STR_CANISTER_GUN: Аэрозольная пушка
  STR_CANISTER_GUN_UFOPEDIA: Это оружие пришельцев стреляет небольшими капсулами заполненными аэрозолем различных химических веществ.
  STR_CANISTER_GUN_AMMO: Боеприпасы для Аэрозольной пушки
  STR_CANISTER_GUN_CLIP_CH: конт. Аэрозоль. пушки
  STR_CANISTER_GUN_CLIP_CH_UFOPEDIA: Этот компактный контейнер заполнен чрезвычайно едкой кислотой.
  STR_CANISTER_GUN_CLIP_I: конт. Аэрозоль. пушки [напалм]
  STR_CANISTER_GUN_CLIP_I_UFOPEDIA: Этот компактный контейнер заполнен легковоспламеняющейся жидкостью. При контакте с воздухом она мгновенно воспламеняется.
  STR_BOLT_ACTION: Старая Трёхлинейка
  STR_BOLT_ACTION_UFOPEDIA: "Старая модель армейской винтовки. Надёжная и на удивление точная в умелых руках.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение I{ALT}."
  STR_BOLT_ACTION_BUY: Приобретение Старой Трёхлинейки
  STR_BLACKOPS_SMARTRIFLE: Смарт-винтовка BlackOps
  STR_BLACKOPS_SMARTRIFLE_UFOPEDIA: "Эта компьютеризированная винтовка отличается высокой скорострельностью и исключительной точностью.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}, {ALT}BlackOps Premium{ALT}."
  STR_BLACKOPS_SMARTRIFLE_BUY: Приобретение Смарт-винтовки BlackOps
  STR_BLACKOPS_SMARTRIFLE_CLIP: маг. Смарт-винт. BlackOps
  STR_BLACKOPS_SMARTRIFLE_AA_CLIP: маг. Смарт-винт. BlackOps [Tr]
  STR_BLACKOPS_SMARTRIFLE_AA_CLIP_MANUFACTURING: Производство маг. Смарт-винт. BlackOps [Tr]
  STR_ASUKA_4000: Asuka 4000
  STR_ASUKA_4000_UFOPEDIA: С одобрения и при неоценимой помощи компании Arasaka мы улучшили их модель 3000. Оружие приспособлено для стрельбы тританиевыми пулями. Калибр также был увеличен, что повысило огневую мощь. Эффективная дальность стрельбы выросла, однако общая точность немного снизилась.
  STR_ASUKA_4000_CLIP: маг. Asuka 4000
  STR_ASSAULT_RIFLE: Штурмовая винтовка BlackOps
  STR_ASSAULT_RIFLE_UFOPEDIA: "Эта универсальная винтовка BlackOps предназначена для боя на средних дистанциях. Она способна выполнять большинство задач на поле боя.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}, {ALT}Контакт: BlackOps Industries{ALT}."
  STR_ASSAULT_RIFLE_BUY: Приобретение Штурмовой винтовки BlackOps
  STR_ARASAKA_3000: Arasaka 3000
  STR_ARASAKA_3000_UFOPEDIA: "Эта высокоточная винтовка - модификация W-2000 Walther. Её выпускает небольшая японская компания. В умелых руках она особенно эффективна.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}, {ALT}Покупка у поставщиков Чёрного Лотоса{ALT}."
  STR_ARASAKA_3000_BUY: Приобретение Arasaka 3000
  STR_ARASAKA_3000_CLIP: маг. Arasaka 3000
  STR_ALIEN_LASER_RIFLE: Винтовка пришельцев
  STR_ALIEN_LASER_RIFLE_UFOPEDIA: Эта лёгкая винтовка - универсальное и мощное лазерное оружие. Пришельцы применяют её для ведения войны и наведения ужаса.
  STR_ALIEN_LASER_RIFLE_CLIP: бат. Винтовки пришельцев
  STR_ALIEN_LASER_RIFLE_CLIP_UFOPEDIA: Эта компактная и эффективная батарея питает лазерное оружие пришельцев.
