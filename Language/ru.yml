  STR_KATAPELTES_SPIRITUS_UFOPEDIA: Двуфункциональное оружие на основе эктоплазмы. Выстреливает сгустками затвердевшей пси-органической энергии плотным залпом. Альтернативный режим стрельбы - распыление эктоплазмы под высоким давлением.
