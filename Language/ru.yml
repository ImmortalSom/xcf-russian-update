  STR_XCOM_ASSAULT_PLASMA_UFOPEDIA: Мы модифицировали стандартную Тяжёлую плазмо-пушку пришельцев. Это позволяет эффективнее использовать навыки ветеранов X-Com. Плазменное оружие по своей природе имеет ограниченную дальность. Поэтому мы отказались от прицельной стрельбы в пользу более эффективного ближнего боя. Особенно в руках элитных агентов с высокой точностью стрельбы и реакцией. Также мы установили подствольный гранатомёт. Он стреляет уменьшенными версиями элериевой бомбы.
