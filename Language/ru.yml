  STR_STAR_PISTOL: Звёздный пистолет
  STR_STAR_PISTOL_UFOPEDIA: Пистолет инопланетной конструкции, стреляющий энергетическими снарядами по принципу, аналогичному "Огненной перчатки", но только значительно усовершенствованный. Вместо простого нагрева окружающего воздуха это оружие использует специальную смесь химических реагентов, которые могут быть легко преобразованы в плазму посредством псионического воздействия. Мощность оружия напрямую зависит от псионического потенциала пользователя. Этот процесс в значительной степени зависит от милости Золотой Леди, поэтому в руках её наиболее преданных последователей оружие становится ещё более мощным.
