ru:
  STR_VAN: ФУРГОН
  STR_VAN_UFOPEDIA: Не самый быстрый автомобиль, зато просторный и неприметный. Невозможно засечь.
  STR_LUXURY_CAR: СПОРТКАР
  STR_LUXURY_CAR_UFOPEDIA: Путешествуйте со вкусом! И только вдвоем! Невозможно засечь.
  STR_CIVILIAN_CAR: СЕДАН
  STR_CIVILIAN_CAR_UFOPEDIA: Самое простое транспортное средство, доступное нашим агентам. Невозможно засечь.
  STR_SHOGG_STUDIES: Исследование Шогга
  STR_SHOGG_STUDIES_UFOPEDIA: Теперь наши исследователи получили доступ к исследованию низших слоев общества Шогга - скорпоидов и людей-муравьев. Как бы изолированы они ни были, мы можем многому у них научиться, и такой способ изучения гораздо проще и безопаснее, чем самостоятельное исследование пещер.
  STR_SHOGG_VILLAGE: Деревня Шогг
  STR_ALERT_SHOGG_VILLAGE: ОБНАРУЖЕНА ДЕРЕВНЯ ШОГГ
  STR_SHOGG_VILLAGE_BRIEFING: Вы готовитесь начать штурм военного поселения нечеловеческих существ, обитающих под землей. Обнаружьте и осуществите захват его правителя, чтобы получить данные о политике Шогга. Чтобы прервать задание, приведите агентов X-COM в зону выхода и кликните по иконке «Покинуть поле боя».
  STR_SHOGG_VILLAGE_DESCRIPTION: Мы обнаружили военное поселение разумных существ, обитающих под землей. Нам необходимо захватить правителя этого поселения с целью получения информации о политике Шогга.
  MAP_SHOGG_VILLAGE: Деревня Шогг
  STR_SHOGG_TECH: Технологии Шогга
  STR_EXPEDITION_SHOGG_OPENING: "Экспедиция в Шогг: Рапорт"
  STR_EXPEDITION_SHOGG: Экспедиция в Шогг
  STR_EXPEDITION_SHOGG_UFOPEDIA: После заключения мира с рептилоидами мы, наконец, получили возможность исследовать их подземное королевство. Многие территории остаются для нас закрытыми, но до тех пор, пока наши намерения остаются сугубо мирными, нам позволено посещать малые поселения и даже унести оттуда пару-тройку безделушек.{NEWLINE}Наши исследователи ждут не дождутся, когда уже смогут приступить к работе!
  STR_PURCHASE_SHOGG_WEAPONS: Покупка оружия Шогга
  STR_PURCHASE_SHOGG_WEAPONS_UFOPEDIA: Новый король скорпионов хочет покупать у нас ресурсы верхнего мира.{NEWLINE}Взамен он готов предоставить нам доступ к оружию и прочим инструментам, активно используемым в подземном мире.
  STR_MASTERS_OF_SHOGG: Повелители Шогга
  STR_MASTERS_OF_SHOGG_UFOPEDIA: Мы знали, что различные племена, населяющие Шог, контактируют с более технологически развитой цивилизацией. Теперь мы понимаем, что эта цивилизация обитает ещё глубже - там, где температура слишком высока для человека. Эти таинственные существа, которых мы знаем как рептилоидов, контролируют политику в подземном мире, но редко прямо вмешиваются в жизнь своих подчиненных. Известно, что они продают технологии в обмен на сырьё и живую силу. Они не очень популярны среди инсектоидов, но без техники рептилоидов жизнь в Шогге была бы невозможна.{NEWLINE}Политическое влияние рептилоидов не даст нам наладить дипломатические отношения с Шоггом, пока мы не вступим в открытое противостояние с этими ящерами. Согласно информации, полученной от наших пленников, рептилоиды передвигаются на волшебных телегах, способных проходить сквозь скалы. Если это действительно так, у нас могут возникнуть проблемы...
  STR_SHOGG_BLADE: Меч Шогга
  STR_SHOGG_BLADE_UFOPEDIA: Этот короткий меч слишком тяжел, что не позволяет нормально пользоваться им обычному человеку, но наносит чудовищные раны, если его берет в руки достаточно сильный боец.
  STR_SHOGG_CUDGEL: Дубина Шогга
  STR_SHOGG_CUDGEL_UFOPEDIA: Простое тупое оружие, которое изготавливается из различных материалов, доступных в Шогге.
  STR_SHOGG_HAMMER: Молот Шогга
  STR_SHOGG_HAMMER_UFOPEDIA: Этот террамитовый молот - смертоносное оружие в сильных руках. Оно легко пробивает легкую броню и обладает сильным ударным действием.
  STR_SHOGG_LANTERN: Фонарь Шогга
  STR_SHOGG_LANTERN_UFOPEDIA: Этот источник света занимает довольно много места, но биофлуоресцирующий компонент продолжает светить, если окружающая температура не упадет ниже определенного порога. Также раз в год его необходимо снабжать питательными веществами. Его могут использовать агенты X-COM, но никакими особыми свойствами по сравнению с обычными источниками света он не обладает.
  STR_SHOGG_STAFF: Посох Шогга
  STR_SHOGG_STAFF_UFOPEDIA: Этот металлический посох изготовлен из террамита. После небольшой подготовки может использоваться в качестве оружия ближнего боя, причем удивительно успешно.
  STR_BLACKOPS_CONTACT: "Контакт: BlackOps Industries"
  STR_BLACKOPS_CONTACT_UFOPEDIA: BlackOps Industries - совершенно секретный производитель передового военного оборудования. Компания поставляет большую часть оружия и устройств, используемых крупными секретными правительственными агентствами по всему миру. Их продукция дорога, но не имеет равных по качеству. Ассортимент расширяется по мере роста нашего влияния.
  STR_BLACKOPS_PREMIUM: BlackOps Premium
  STR_BLACKOPS_PREMIUM_UFOPEDIA: По мере роста нашего влияния BlackOps предлагает включить нас в список премиальных клиентов. Это откроет доступ к широкому ассортименту передового экспериментального оборудования - при условии, что мы будем обращаться к ним с конкретными запросами.
  STR_MASS_DRIVER_WEAPONS_UFOPEDIA: Масс-драйвер используют мощную катушку для разгона небольших снарядов за счёт электромагнитной силы. Снаряды Масс-драйвер значительно быстрее обычных пуль и поэтому гораздо мощнее. Однако их дальность невелика - они быстро сгорают в атмосфере. Из-за экстремального тепловыделения оружие на этой основе не способно вести автоматический огонь.
  STR_MASS_DRIVER_WEAPONS: Масс-драйвер оружие
  STR_MASS_DRIVER_HAND_WEAPONS_MANUFACTURING: Изготовление Масс-драйвер оружия
  STR_MASS_DRIVER_HAND_WEAPONS_MANUFACTURING_UFOPEDIA: Наше недавно полученное понимание сверхпроводящих цепей позволило воспроизводить любые Масс-драйвер оружия, найденные на поле боя. Хотя это решение дорогостоящее, его боевая эффективность на единицу массы оружия превосходит традиционные образцы.
  STR_HAVOC_AMMO: Боеприпасы Havoc
  STR_HAVOC_AMMO_UFOPEDIA: "{ALT}Боеприпасы Havoc были разработаны EXALT специально для борьбы с бронированными противниками. В умелых руках они дают повышенную огневую мощь. Однако эти патроны капризны и склонны к непредсказуемому поведению при неаккуратном обращении. Поэтому только спецподразделения EXALT считаются достаточно подготовленными для их эффективного применения.{NEWLINE}Такие боеприпасы могут оказаться полезны X-Com - но лишь при условии, что в наших рядах есть стрелки, способные в полной мере использовать их преимущества.{NEWLINE}{NEWLINE}Боеприпасы Havoc дают бонус к мощности выстрела, равный 25% от точности стрельбы. При этом они значительно снижают эффективную точность оружия.{ALT}"
  STR_CUSTOMIZED_DIMENSIONAL_BATTERIES: "[XD] Трансразмерные батареи"
  STR_CUSTOMIZED_DIMENSIONAL_BATTERIES_UFOPEDIA: "[XD] Экстрадименсиональные батареи - доступная, хотя и несовершенная альтернатива инопланетным источникам питания для ручного оружия. Поскольку мы освоили эту технологию, нашим инженерам не составляет труда создавать энергоблоки для известных образцов оружия без использования инопланетных материалов. Требуется лишь доступ к трансразмерной энергосети. Недостаток в том, что такие блоки слабее и имеют меньшую ёмкость по сравнению с оригинальными. Тем не менее они остаются привлекательной альтернативой обычному стрелковому оружию."
  STR_RPG_BUY: Покупка РПГ
  STR_RPG: РПГ
  STR_RPG_CRAFT_WEAPON_UC: РПГ
  STR_RPG_ROCKET: б-п РПГ
  STR_RPG_AT_ROCKET: б-п РПГ [кумулятив]
  STR_RPG_UFOPEDIA: "РПГ - это классическая ручная пусковая ракетная установка. В зависимости от типа используемых боеприпасов он может наносить большой урон как живой силе, так и бронетехнике.{NEWLINE}Чтобы купить это оружие, требуется: {ALT}Повышение III{ALT}, {ALT}Лицензия на взрыв. вещества{ALT}."
  STR_MILKOR_MGL: Milkor MGL
  STR_MILKOR_MGL_CONT: Milkor MGL (продолжение)
  STR_MILKOR_MGL_BUY: Покупка Milkor MGL
  STR_MILKOR_MGL_CLIP: бар. Milkor MGL [фугас]
  STR_MILKOR_MGL_CLIP_BEAN: бар. Milkor MGL [оглуш.]
  STR_MILKOR_MGL_CLIP_INC: бар. Milkor MGL [напалм]
  STR_MILKOR_MGL_CLIP_SMOKE: бар. Milkor MGL [дым]
  STR_MILKOR_MGL_CLIP_FLASHBANG: бар. Milkor MGL [светошум]
  STR_MILKOR_MGL_CLIP_ELERIUM: бар. Milkor MGL [E-115]
  STR_BREAKDOWN_STR_MILKOR_MGL_CLIP_ELERIUM: "РЗБ: бар. Milkor MGL [E-115]"
  STR_MILKOR_MGL_UFOPEDIA: Шестизарядный гранатомет револьверного типа, производимый в ЮАР. Модифицирован таким образом, чтобы стрельбу из него можно было вести одной рукой.{NEWLINE}{NEWLINE}Стреляет стандартными 40х46-мм гранатами.
  STR_GRENADE_LAUNCHER_BUY: Покупка Гранатомета
  STR_GRENADE_LAUNCHER: Гранатомет
  STR_GRENADE_LAUNCHER_CONT: Гранатомет (Продолжение)
  STR_LAUNCHER_FRAG: 46-мм граната [фугас]
  STR_LAUNCHER_BEAN: 46-мм граната [оглуш.]
  STR_LAUNCHER_INC: 46-мм граната [напалм]
  STR_LAUNCHER_SMOKE: 46-мм граната [дым]
  STR_LAUNCHER_FLASHBANG: 46-мм граната [светошум.]
  STR_LAUNCHER_ELERIUM: 46-мм граната [E-115]
  STR_GRENADE_LAUNCHER_UFOPEDIA: Гранатомёт использует различные типы боеприпасов и эффективен в самых разных ситуациях.{NEWLINE}Из-за меньшего размера по сравнению с ручной гранатой его эффективность на 10% ниже.
  STR_FLAMETHROWER_CLIP: бак Огнемёта
  STR_AGRICULTURAL_FLAMER_BUY: Покупка Сельхоз-огнемета
  STR_AGRICULTURAL_FLAMER: Сельхоз-огнемет
  STR_AGRICULTURAL_FLAMER_UFOPEDIA: Этот сельскохозяйственный инструмент можно адаптировать для полевого применения нашими агентами. Он поджигает местность и врагов, но обладает крайне ограниченной дальностью (6).
  STR_SPORTING_BOW: Спортивный лук
  STR_SPORTING_BOW_QUIVER: колч. Спортивного лука
  STR_SPORTING_BOW_UFOPEDIA: Современные спортивные луки изготавливаются из полимеров и других продвинутых материалов. Высокоточные, в использовании они намного удобнее своих древних аналогов, но для нанесения серьёзных ран они всё же не предназначены.
  STR_HEAVY_CROSSBOW: Тяжелый арбалет
  STR_HEAVY_CROSSBOW_BOLTS: болты Тяжелого арбалета
  STR_HEAVY_CROSSBOW_TRITANIUM_BOLTS: болты Тяжелого арбалета [Tr]
  STR_HEAVY_CROSSBOW_TRITANIUM_BOLTS_XXX: болты Тяжелого арбалета [Tr] (x9)
  STR_HEAVY_CROSSBOW_UFOPEDIA: Этот арбалет чудовищных размеров требует от стрелка большой физической силы.
  STR_CROSSBOW: Арбалет
  STR_CROSSBOW_BOLTS: болты Арбалетные
  STR_CROSSBOW_TRITANIUM_BOLTS: болты Арбалетные [Tr]
  STR_CROSSBOW_TRITANIUM_BOLTS_XXX: болты Арбалетные [Tr] (x13)
  STR_CROSSBOW_UFOPEDIA: Арбалеты - это традиционное оружие, не слишком мощное, но всё ещё смертоносное. Арбалетные болты имеют больший шанс пробить кевларовый жилет, чем пули.
  STR_BOW_QUIVER: колч. Лука
  STR_BOW: Лук
  STR_BOW_UFOPEDIA: Этот изготовленный из природных материалов лук не слишком отличается от своих собратьев из прошлого. Его эффективность зависит главным образом от навыка стрелка.
  STR_VSS: ВСС "Винторез"
  STR_VSS_UFOPEDIA: "Российский снайперский карабин для подразделений специального назначения. Способен вести огонь очередями. Компактен - помещается в малогабаритный багаж. Однако сложен в обращении.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}."
  STR_VSS_BUY: Приобретение ВСС "Винторез"
  STR_VSS_CLIP: маг. ВСС "Винторез"
  STR_TURBOLASER_SNIPER_RIFLE: Турболазерная снайперская винтовка
  STR_TURBOLASER_SNIPER_RIFLE_UFOPEDIA: Эта версия Турболазерной винтовки не имеет режима автоматической стрельбы. Однако это с избытком компенсируется её точностью и мощностью.
  STR_TURBOLASER_SNIPER_RIFLE_DISASSEMBLY: "РЗБ: Турболазерная снайперская винтовка"
  STR_SNIPER_RIFLE: Снайп. винтовка .308
  STR_SNIPER_RIFLE_UFOPEDIA: "Типовая модель снайперской винтовки со скользящим затвором. Рассчитана на популярный и мощный патрон .308 Winchester. Оснащена военной оптикой.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}."
  STR_SNIPER_RIFLE_BUY: Приобретение Снайп. винтовки .308
  STR_SNIPER_RIFLE_CLIP: маг. Снайп. винтовки .308
  STR_PSG1: PSG-1
  STR_PSG1_UFOPEDIA: "Снайперская винтовка, разработанная в 1970-х гг. фирмой Heckler & Koch главным образом для нужд полиции. Предназначена для поражения целей, частично находящихся за укрытиями, но склонна к осечкам при неправильном обслуживании. Её огневая мощь сильно зависит от навыка стрелка, но пули, выпущенные из неё, неплохо пробивают броню.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}."
  STR_PSG1_BUY: Приобретение PSG-1
  STR_PSG1_CLIP: маг. PSG-1
  STR_PLASMA_SNIPER_RIFLE: Плазменная снайп. винтовка
  STR_PLASMA_SNIPER_RIFLE_UFOPEDIA: Это чрезвычайно точное и мощное оружие. В его основе - ускорение частиц в миниатюрном антигравитационном поле.
  STR_PLASMA_SNIPER_RIFLE_CLIP: бат. Плазменной снайп. винтовки
  STR_PLASMA_SNIPER_RIFLE_CLIP_UFOPEDIA: Этот компактный объект служит источником питания для Плазменной снайперской винтовки - высокоточного инопланетного оружия. Содержит небольшое количество элерия, которое можно извлечь.
  STR_PLASMA_SNIPER_RIFLE_DISASSEMBLY: "РЗБ: Плазменная снайп. винтовка"
  STR_BREAKDOWN_STR_PLASMA_SNIPER_RIFLE_CLIP: "РЗБ: бат. Плазменной снайп. винтовки"
  STR_NATASHAS_VSS: Заказная ВСС Наташи
  STR_NATASHAS_VSS_UFOPEDIA: Индивидуальная модификация легендарной ВСС "Винторез". Отличается усовершенствованным затворным механизмом и продвинутой прицельной системой. Использует специальные патроны и требует высокого уровня подготовки для эффективной стрельбы.
  STR_NATASHAS_VSS_CLIP: маг. Заказной ВСС Наташи
  STR_MOSIN_RIFLE: Винтовка Мосина
  STR_MOSIN_RIFLE_UFOPEDIA: "Разработана в Российской Империи, но производилась ещё долгое время после революции. К настоящему времени несколько устарела, однако по-прежнему ценится за исключительную точность. {NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение I{ALT}."
  STR_MOSIN_RIFLE_BUY: Приобретение Винтовки Мосина
  STR_BOLT_ACTION_CLIP: обой. Винтовки Мосина
  STR_MASS_DRIVER_SNIPER_RIFLE: Масс-драйвер снайперка
  STR_MASS_DRIVER_SNIPER_RIFLE_UFOPEDIA: Масс-драйвер снайперская винтовка - успешная попытка использовать врождённые преимущества Масс-драйвер винтовки. Она ещё мощнее и определённо точнее, что позволяет оперативникам X-Com уничтожать серьёзных противников одним выстрелом. Это делает отсутствие режима автоматической стрельбы несущественным.
  STR_MASS_DRIVER_SNIPER_RIFLE_CLIP: маг. Масс-драйвер снайперки
  STR_MASS_DRIVER_SNIPER_RIFLE_DISASSEMBLY: "РЗБ: Масс-драйвер снайперка"
  STR_M82_BARETT: M82 Barrett
  STR_M82_BARETT_UFOPEDIA: "Крупнокалиберная снайперская винтовка. Применяется армией США для поражения легкобронированной техники и ключевых целей противника с очень больших дистанций. Не рекомендуется вести огонь из этого оружия стоя.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение III{ALT}."
  STR_M82_BARETT_BUY: Приобретение M82 Barrett
  STR_M82_BARETT_CLIP: маг. M82 Barrett
  STR_LASER_SNIPER_RIFLE: Лазерная снайп. винтовка
  STR_LASER_SNIPER_RIFLE_UFOPEDIA: Высокоточная винтовка, испускающая сфокусированный лазерный луч. Он легко преодолевает большинство видов брони, разработанной для защиты от земного оружия.
  STR_LASER_SNIPER_RIFLE_CLIP: бат. Лазерной снайп. винтовки
  STR_LASER_SNIPER_RIFLE_XD_CLIP: бат. Лазерной снайп. винтовки [XD]
