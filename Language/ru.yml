  STR_PANCOR_JACKHAMMER: Pancor Jackhammer
  STR_PANCOR_JACKHAMMER_UFOPEDIA: "Несмотря на быстрый газоотводный механизм перезарядки, производство было прекращено из-за высокой цены, технических проблем и непригодности для гражданского рынка. Однако дизайн остался популярным благодаря эстетике и футуристическому виду. Из-за лёгкой полимерной рамы отдача довольно значительна.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение II{ALT}, {ALT}Лицензия на пулемёты{ALT}, {ALT}Возрождённое оружие{ALT}."
