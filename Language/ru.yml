  STR_MASS_DRIVER_RIFLE_UFOPEDIA: Увеличенная и модифицированная версия Масс-драйвер пистолета. Винтовка отличается высокой точностью и чрезвычайно мощная. Малый размер снарядов позволяет использовать ёмкий магазин на множество выстрелов. Очевидный недостаток - отсутствие режима автоматической стрельбы. Это вызвало бы мгновенное перегревание оружия.
