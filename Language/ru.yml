  STR_SKS: СКС
  STR_SKS_UFOPEDIA: "Советский самозарядный карабин. Разработан во время Второй мировой войны. До сих пор состоит на вооружении некоторых армий. Также используется для тренировок и церемоний. Оснащён штыком для ближнего боя.{NEWLINE}{NEWLINE}>Для приобретения этого оружия требуется: {ALT}Повышение I{ALT}, {ALT}Нештатное оружие{ALT}."
  STR_SKS_BUY: Приобретение СКС
  STR_SKS_CLIP: обой. СКС
  STR_SHOGG_STINGRIFLE: Шипомёт Шоггов
  STR_SHOGG_STINGRIFLE_UFOPEDIA: Это ручное оружие стреляет острыми как игла шипами биологического происхождения. Благодаря уникальным свойствам материала шипы пробивают лёгкую броню. Образуется крошечное отверстие, через которое вводится мощный химический агент. Оружие вызывает сильные ожоги глубоко под кожей жертвы. Это часто приводит к мучительной смерти.
