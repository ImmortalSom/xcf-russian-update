  STR_KATAPELTES_SPIRITUS_SPRAY_CLIP_UFOPEDIA: Флаконы для режима распыления Katapeltes Spiritus. Эктоплазма под высоким давлением питает распылительные сопла оружия.
  STR_HUMAN_SONIC_SHOTGUN: Акустический дробовик
  STR_HUMAN_SONIC_SHOTGUN_UFOPEDIA: Элегантное оружие, воплощающее гармоничное сочетание человеческих и инопланетных технологий. Созданный нами эмиттер в стандартном режиме генерирует 6 звуковых импульсов, расходящихся под небольшими углами. Это действие можно повторить дважды подряд без риска перегрева генератора.
  STR_HUMAN_SONIC_SHOTGUN_PELLET_CLIP: бат. Акуст. дробовика
  STR_HUMAN_SONIC_SHOTGUN_FOCUSED_CLIP: бат. Акуст. дробовика [фокус]
  STR_HUMAN_SONIC_SHOTGUN_FOCUSED_CLIP_UFOPEDIA: Эволюция технологии фокусировки звуковых импульсов позволила создать модификацию Акустического дробовика, генерирующую один мощный заряд вместо рассеивания нескольких слабых. Точность значительно повышается, а потеря мощности импульса на расстоянии снижается. Однако скорострельность заметно падает из-за перегрева генератора.{NEWLINE}Для перевода генератора в режим сфокусированного огня требуется специальный одноразовый модуль, который загружается в оружие отдельно от основного боекомплекта.{NEWLINE}Для совершения выстрела в этом режиме выберите в меню оружия пункт {ALT}Сфокусированный выстрел{ALT}.
