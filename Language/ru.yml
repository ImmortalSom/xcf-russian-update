  STR_M60_BUY: Покупка M-60
  STR_M60_UFOPEDIA: "Американский пулемет, прошедший боевое крещение во Вьетнаме, но в наши дни уступивший место более легкому оружию поддержки на уровне отделения. Мощный патрон калибра 7.62x51mm делает его эффективным даже на достаточно дальних дистанциях. Вести из него огонь в положении стоя рекомендуется только при позировании для фотографий.{NEWLINE}{NEWLINE}Чтобы купить это оружие, требуется: {ALT}Лицензия на пулеметы{ALT}."
