  STR_SMART_SHOTGUN: Смарт-дробовик
  STR_SMART_SHOTGUN_UFOPEDIA: Этот передовой мини-дробовик был специально разработан главным инженером X-Com. При его создании инженер во многом опирался на работы своего деда. Оружие оснащено компьютеризированной гироскопической рамой с лазерным наведением. Эта система заметно сокращает время прицеливания.
