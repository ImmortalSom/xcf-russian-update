  STR_THRASHER_SHOTGUN: Тяж. дробовик Thrasher
  STR_THRASHER_SHOTGUN_UFOPEDIA: "Официальное наименование: TRSh Close Combat Weapon; общепринятое название: Thrasher. Разработан корпорацией M.A.G.M.A. Этот крупногабаритный образец воплощает восточный подход к концепции дробовика. Обладает сокрушительной мощью."
