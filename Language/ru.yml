  STR_WARP_RIFLE: WARP-винтовка
  STR_WARP_RIFLE_UFOPEDIA: Это экзотическое оружие испускает луч, дестабилизирующий атомные взаимодействия. Это приводит к мгновенному разрушению цели. Броня практически бесполезна - WARP-луч легко разрывает её на части.
  STR_WARP_RIFLE_CLIP: бат. WARP-винтовки
  STR_WARP_RIFLE_DISASSEMBLY: "РЗБ: WARP-винтовки"
  STR_UAC_RIFLE: Винтовка VAST
  STR_UAC_RIFLE_UFOPEDIA: Винтовка VAST ведёт огонь короткими очередями по три выстрела. Это обеспечивает высокий уровень контроля огня. Как и всё оборудование VAST, она способна работать в открытом космосе.
  STR_UAC_RIFLE_BUY: Приобретение Винтовки VAST
